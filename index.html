<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Variables globales pour forcer le lecteur en mode monochrome épuré */
        :root {
            --plyr-color-main: #ffffff;
            --plyr-video-control-color: #b0b0b0;
            --plyr-video-control-color-hover: #ffffff;
        }

        body { 
            background-color: #050505; 
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- MOTION DESIGN (Animations) --- */
        
        /* Animation d'apparition fluide avec effet de translation */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Léger effet de lueur sur le titre */
        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(255,255,255,0); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,0.2); }
            100% { text-shadow: 0 0 10px rgba(255,255,255,0); }
        }

        /* --- UI ELEMENTS --- */

        .header {
            margin-bottom: 25px;
            text-align: center;
            /* Animation immédiate pour le titre */
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .header h1 {
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            color: #ffffff;
            animation: textGlow 3s infinite alternate ease-in-out;
        }

        .header p {
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #555;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .video-wrapper { 
            width: 90%; 
            max-width: 1000px; 
            box-shadow: 0px 30px 60px rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            
            /* Motion Design : Le lecteur apparaît juste après le titre */
            opacity: 0; /* Caché au départ */
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.2s; /* Décalage pour l'effet cascade */
            
            /* Transition douce pour l'effet de survol */
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Effet interactif au survol de la vidéo */
        .video-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0px 40px 70px rgba(255, 255, 255, 0.03);
        }

        /* Arrondir les angles de l'interface interne de Plyr */
        .plyr {
            border-radius: 12px;
        }
    </style>
</head>

    <script>
        // Initialisation de Plyr avec des contrôles choisis pour garder un aspect clean
