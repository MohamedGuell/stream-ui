<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Player - Environnement de Test</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --plyr-color-main: #ffffff;
            --plyr-video-control-color: #888888;
            --plyr-video-control-color-hover: #ffffff;
        }

        body { 
            /* Effet Maquette : Fond sombre avec une grille de points */
            background-color: #0a0a0a; 
            background-image: radial-gradient(#2a2a2a 1px, transparent 0);
            background-size: 20px 20px;
            
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- MOTION DESIGN (Animations de ta version) --- */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(255,255,255,0); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,0.2); }
            100% { text-shadow: 0 0 10px rgba(255,255,255,0); }
        }

        /* --- UI ELEMENTS --- */
        .header {
            margin-bottom: 20px;
            text-align: center;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .header h1 {
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            color: #ffffff;
            animation: textGlow 3s infinite alternate ease-in-out;
        }

        .header p {
            font-family: 'JetBrains Mono', monospace; /* Police code pour le côté technique */
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Effet Maquette : Fenêtre de logiciel */
        .mockup-window {
            width: 90%;
            max-width: 1000px;
            background: #000000;
            border: 1px dashed #333333; 
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0px 30px 60px rgba(0, 0, 0, 0.9);
            
            /* Animation d'entrée décalée par rapport au titre */
            opacity: 0; 
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.2s; 
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .mockup-window:hover {
            transform: translateY(-5px);
            box-shadow: 0px 40px 70px rgba(255, 255, 255, 0.03);
            border-color: #555;
        }

        /* Fausse barre macOS */
        .window-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .window-controls .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #333;
        }
        
        .window-controls .dot:nth-child(1) { background-color: #ff5f56; } /* Rouge */
        .window-controls .dot:nth-child(2) { background-color: #ffbd2e; } /* Jaune */
        .window-controls .dot:nth-child(3) { background-color: #27c93f; } /* Vert */

        .video-wrapper { 
            border-radius: 4px;
            overflow: hidden;
            background-color: #111;
            position: relative;
        }

        .plyr {
            border-radius: 4px;
        }

        /* Message de statut au chargement */
        #status-message {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 1px solid #ff4444;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="header">

        <p>test en cours . . .</p>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // Initialisation de Plyr
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            hideControls: true
        });

        // Affichage du message rouge uniquement si le lien est vraiment brisé ou expiré
        document.getElementById('player').addEventListener('error', function() {
            document.getElementById('status-message').style.display = 'block';
        });
    </script>
